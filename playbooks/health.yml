- name: DR Health Check
  hosts: localhost
  gather_facts: no

  tasks:
    # -----------------------------
    # Validate environment variable FIRST
    # (prevents accidental prod backup to non-prod buckets)
    # -----------------------------
    - name: Validate environment variable
      assert:
        that:
          - env is defined
          - env in ['dev', 'test', 'prod']
        fail_msg: "env variable is missing or invalid"

    - name: Show environment
      debug:
        msg: "Running in environment: {{ env }}"
        
    - name: Print received variables
      debug:
        msg: "Checking health for {{ target_host }}"

    - name: Wait for app + DB health
      uri:
        url: "http://{{ target_host }}/health.php"
        method: GET
        status_code: 200
      register: health_check
      retries: 5
      delay: 10
      until: health_check.status == 200

    - name: Show health check result
      debug:
        var: health_check.status
