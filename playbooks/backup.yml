- name: Backup from On-Prem (DR-aware)
  hosts: onprem-server
  become: yes
  gather_facts: no


  tasks:
    # -----------------------------
    # Validate environment variable FIRST
    # (prevents accidental prod backup to non-prod buckets)
    # -----------------------------
    - name: Validate environment variable
      assert:
        that:
          - env is defined
          - env in ['dev', 'test', 'prod']
        fail_msg: "env variable is missing or invalid"

    - name: Show environment
      debug:
        msg: "Running in environment: {{ env }}"
        
    # -----------------------------
    # Check connectivity FIRST
    # -----------------------------
    - name: Check if on-prem is reachable
      wait_for_connection:
        timeout: 10
      register: conn_check
      ignore_errors: yes

    # -----------------------------
    # If unreachable → don't fail
    # -----------------------------
    - name: Skip backup (expected in DR)
      debug:
        msg: "On-prem unreachable — skipping backup (expected DR scenario)"
      when: conn_check is failed

    - name: Gather facts (only if reachable)
      setup:
      when: conn_check is succeeded
    # -----------------------------
    # Run backup ONLY if reachable
    # -----------------------------
    - name: Run DB backup role
      include_role:
        name: db_backup
      when: conn_check is succeeded
