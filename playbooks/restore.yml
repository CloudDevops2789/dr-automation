- name: DR Restore - Prepare dynamic host
  hosts: localhost
  gather_facts: no

  tasks:

    - name: Add dynamic host
      add_host:
        name: "{{ target_host }}"
        groups: dr_dynamic
        ansible_user: ubuntu

    - name: Wait for SSH to be ready
      wait_for:
        host: "{{ target_host }}"
        port: 22
        delay: 10
        timeout: 300

- name: Run restore on dynamic host
  hosts: dr_dynamic
  become: yes

  roles:
    - app_restore
