- name: DR Restore - Prepare dynamic host
  hosts: localhost
  gather_facts: no

  tasks:
    # -----------------------------
    # Validate environment variable FIRST
    # (prevents accidental prod backup to non-prod buckets)
    # -----------------------------
    - name: Validate environment variable
      assert:
        that:
          - env is defined
          - env in ['dev', 'test', 'prod']
        fail_msg: "env variable is missing or invalid"

    - name: Show environment
      debug:
        msg: "Running in environment: {{ env }}"
        
    - name: Add dynamic host
      add_host:
        name: "{{ target_host }}"
        groups: dr_dynamic
        ansible_user: ubuntu

    - name: Wait for SSH to be ready
      wait_for:
        host: "{{ target_host }}"
        port: 22
        delay: 10
        timeout: 300

- name: Run restore on dynamic host
  hosts: dr_dynamic
  become: yes

  roles:
    - app_restore
